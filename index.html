<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ChuvaMap – Previsão de Chuva</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #0a0f1e;
    --panel: #0f1628;
    --panel2: #141d35;
    --border: rgba(100,160,255,0.15);
    --accent: #4da6ff;
    --accent2: #00e5ff;
    --text: #e8f0ff;
    --muted: #6a7fa8;
    --rain0: #160033;
    --rain20: #0000cc;
    --rain40: #00aaff;
    --rain60: #00ffcc;
    --rain80: #aaff00;
    --rain100: #ffaa00;
    --rain120: #ff4400;
    --rain160: #cc0000;
    --rain200: #880000;
    --radius: 12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--text); font-weight: 400; }

  .location-pill {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: border-color .2s;
    max-width: 160px;
  }
  .location-pill:hover { border-color: var(--accent); }
  .location-pill .loc-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .btn-locate {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: opacity .2s, transform .2s;
    flex-shrink: 0;
  }
  .btn-locate:hover { opacity:.85; transform:scale(1.05); }
  .btn-locate.locating { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── LAYER TABS ── */
  .layer-tabs {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .layer-tabs::-webkit-scrollbar { display:none; }

  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .5px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .tab:hover { color: var(--text); border-color: var(--accent); }
  .tab.active {
    background: linear-gradient(135deg, #1a3a6a, #0d2a50);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .leaflet-container { background: #05091a !important; }

  /* custom attribution */
  .leaflet-control-attribution {
    background: rgba(10,15,30,0.85) !important;
    color: #4a5a7a !important;
    font-size: 9px !important;
  }

  /* ── LEGEND ── */
  .legend-panel {
    position: absolute;
    right: 10px;
    top: 10px;
    z-index: 900;
    background: rgba(10,15,30,0.9);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 10px;
    backdrop-filter: blur(8px);
    min-width: 60px;
  }

  .legend-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: .5px;
  }

  .legend-bar {
    width: 18px;
    height: 160px;
    border-radius: 4px;
    margin: 0 auto;
    background: linear-gradient(to top,
      #160033 0%,
      #0000cc 10%,
      #0044ff 18%,
      #0099ff 28%,
      #00e5ff 38%,
      #00ff99 48%,
      #aaff00 57%,
      #ffff00 65%,
      #ffaa00 73%,
      #ff5500 81%,
      #ff0000 89%,
      #880000 100%
    );
    border: 1px solid rgba(255,255,255,0.15);
  }

  .legend-labels {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 160px;
    margin-top: -160px;
    margin-left: 24px;
    font-size: 10px;
    color: var(--muted);
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 160px;
  }

  .legend-scale {
    font-size: 9px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }

  .legend-unit {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  /* ── BOTTOM INFO PANEL ── */
  .info-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    flex-shrink: 0;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .info-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }

  .info-card .val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
    line-height: 1;
  }

  .info-card .lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: .3px;
  }

  /* ── DATE SLIDER ── */
  .time-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 8px 16px 10px;
    flex-shrink: 0;
  }

  .time-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .time-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: .5px;
  }

  .time-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
  }

  .model-badge {
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(77,166,255,0.15);
    border: 1px solid rgba(77,166,255,0.3);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .5px;
  }

  input[type=range] {
    width: 100%;
    height: 4px;
    appearance: none;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct,0%), rgba(100,160,255,0.2) var(--pct,0%));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 16px; height: 16px;
    background: var(--accent2);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent2);
    cursor: pointer;
    transition: transform .1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .time-marks {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }
  .time-mark {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
  }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: rgba(10,15,30,0.95) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    color: var(--text) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    backdrop-filter: blur(8px);
  }
  .leaflet-popup-tip { background: rgba(10,15,30,0.95) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; font-size: 13px; }

  .popup-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .popup-row { display:flex; justify-content:space-between; gap:16px; margin:3px 0; }
  .popup-key { color: var(--muted); font-size: 12px; }
  .popup-val { font-weight: 500; font-size: 12px; }

  /* ── LOADING ── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,15,30,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    backdrop-filter: blur(4px);
    transition: opacity .3s;
  }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(77,166,255,0.2);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text {
    margin-top: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── USER MARKER ── */
  .user-marker {
    width: 20px; height: 20px;
    background: radial-gradient(circle, #00e5ff 30%, transparent 70%);
    border-radius: 50%;
    border: 2px solid #00e5ff;
    box-shadow: 0 0 0 4px rgba(0,229,255,0.2), 0 0 12px rgba(0,229,255,0.6);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{box-shadow:0 0 0 4px rgba(0,229,255,0.2),0 0 12px rgba(0,229,255,0.6)} 50%{box-shadow:0 0 0 8px rgba(0,229,255,0.05),0 0 20px rgba(0,229,255,0.3)} }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15,22,40,0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all .3s;
    z-index: 5000;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🌧 <span>Chuva</span>Map</div>
  <div class="location-pill" id="locPill" onclick="locateUser()">
    <span>📍</span>
    <span class="loc-name" id="locName">Localizar...</span>
  </div>
  <button class="btn-locate" id="btnLocate" onclick="locateUser()" title="Minha localização">
    🎯
  </button>
</header>

<!-- LAYER TABS -->
<div class="layer-tabs">
  <button class="tab active" onclick="setLayer('precip_accum', this)">🌧 Chuva Acumulada</button>
  <button class="tab" onclick="setLayer('precip_rate', this)">⛈ Intensidade</button>
  <button class="tab" onclick="setLayer('clouds', this)">☁️ Nuvens</button>
  <button class="tab" onclick="setLayer('temp', this)">🌡 Temperatura</button>
  <button class="tab" onclick="setLayer('wind', this)">💨 Vento</button>
</div>

<!-- MAP -->
<div id="map">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">CARREGANDO DADOS...</div>
  </div>

  <!-- LEGEND -->
  <div class="legend-panel" id="legendPanel">
    <div class="legend-title" id="legendTitle">PRECIP.</div>
    <div class="legend-row">
      <div class="legend-bar" id="legendBar"></div>
      <div style="display:flex;flex-direction:column;justify-content:space-between;height:160px;margin-left:4px;">
        <div style="font-size:9px;color:var(--muted)">200</div>
        <div style="font-size:9px;color:var(--muted)">160</div>
        <div style="font-size:9px;color:var(--muted)">120</div>
        <div style="font-size:9px;color:var(--muted)">80</div>
        <div style="font-size:9px;color:var(--muted)">40</div>
        <div style="font-size:9px;color:var(--muted)">0</div>
      </div>
    </div>
    <div class="legend-unit" id="legendUnit">mm</div>
  </div>
</div>

<!-- TIME SLIDER -->
<div class="time-panel">
  <div class="time-header">
    <span class="time-label">HORIZONTE</span>
    <span class="time-value" id="timeValue">+0h (Agora)</span>
    <span class="model-badge" id="modelBadge">ECMWF</span>
  </div>
  <input type="range" id="timeSlider" min="0" max="7" step="1" value="0"
    oninput="onSlider(this)">
  <div class="time-marks" id="timeMarks"></div>
</div>

<!-- BOTTOM INFO -->
<div class="info-panel">
  <div class="info-grid">
    <div class="info-card">
      <div class="val" id="statChuva">--</div>
      <div class="lbl">Precip. Local (mm)</div>
    </div>
    <div class="info-card">
      <div class="val" id="statTemp">--</div>
      <div class="lbl">Temperatura (°C)</div>
    </div>
    <div class="info-card">
      <div class="val" id="statVento">--</div>
      <div class="lbl">Vento (km/h)</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
let map, userMarker, rainLayer, currentLayer = 'precip_accum';
let userLat = -15, userLon = -47; // fallback: Brasília
let currentStep = 0;
let weatherData = null;

// forecast timestamps (hoje + 7 dias)
const steps = [];
const now = new Date();
for (let i = 0; i <= 7; i++) {
  const d = new Date(now);
  d.setDate(d.getDate() + i);
  steps.push(d);
}

// ──────────────────────────────────────────
// INIT MAP
// ──────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: [-15, -52],
    zoom: 4,
    zoomControl: false,
    attributionControl: true
  });

  // Dark basemap
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Country/state borders overlay
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    opacity: 0.6,
    pane: 'shadowPane'
  }).addTo(map);

  // Add zoom control bottom-right
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Click to show popup
  map.on('click', onMapClick);

  // Load precipitation layer
  loadRainLayer('precip_accum', 0);

  // Build time marks
  buildTimeMarks();

  // Auto-locate
  setTimeout(locateUser, 800);
}

// ──────────────────────────────────────────
// RAIN LAYER via Open-Meteo + Rainviewer
// ──────────────────────────────────────────
function loadRainLayer(type, step) {
  if (rainLayer) { map.removeLayer(rainLayer); rainLayer = null; }

  showLoading(true);

  if (type === 'precip_accum' || type === 'precip_rate') {
    // Use RainViewer for radar/precipitation tiles
    loadRainViewer(step);
  } else {
    // For other layers use Open-Meteo generated color tiles
    loadOpenMeteoLayer(type, step);
  }
}

function loadRainViewer(step) {
  // RainViewer API - free precipitation radar/nowcast
  fetch('https://api.rainviewer.com/public/weather-maps.json')
    .then(r => r.json())
    .then(data => {
      showLoading(false);
      const frames = [...(data.radar?.past || []), ...(data.radar?.nowcast || [])];
      if (!frames.length) { fallbackTileLayer(); return; }

      const idx = Math.min(step, frames.length - 1);
      const frame = frames[idx];
      const tileUrl = data.host + frame.path + '/512/{z}/{x}/{y}/4/1_1.png';

      rainLayer = L.tileLayer(tileUrl, {
        opacity: 0.75,
        attribution: '© RainViewer',
        tileSize: 512,
        zoomOffset: -1
      }).addTo(map);

      updateTimeLabel(frame.time * 1000);
    })
    .catch(() => { showLoading(false); fallbackTileLayer(); });
}

function loadOpenMeteoLayer(type, step) {
  // For temperature/wind/clouds show a colored canvas overlay
  showLoading(false);
  renderCanvasLayer(type);
}

function fallbackTileLayer() {
  // WeatherAPI WMS fallback
  rainLayer = L.tileLayer(
    'https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=demo',
    { opacity: 0.6, attribution: '© OpenWeatherMap' }
  ).addTo(map);
}

// Simple canvas overlay for non-rain layers (temperature, wind etc)
// Shows a semi-transparent info message
function renderCanvasLayer(type) {
  const labels = {
    clouds: { title: 'NEBULOSIDADE', unit: '%', color: '#aaa' },
    temp:   { title: 'TEMPERATURA',  unit: '°C', color: '#ff6644' },
    wind:   { title: 'VENTO',        unit: 'km/h', color: '#44ddff' }
  };

  // Update legend
  const cfg = labels[type] || labels.clouds;
  document.getElementById('legendTitle').textContent = cfg.title;
  document.getElementById('legendUnit').textContent = cfg.unit;

  // Use Open-Meteo WMS if available; otherwise show placeholder
  updateLegendForLayer(type);
}

function updateLegendForLayer(type) {
  const bar = document.getElementById('legendBar');
  const unit = document.getElementById('legendUnit');
  const title = document.getElementById('legendTitle');

  const configs = {
    precip_accum: {
      gradient: 'linear-gradient(to top,#160033 0%,#0000cc 10%,#0044ff 18%,#0099ff 28%,#00e5ff 38%,#00ff99 48%,#aaff00 57%,#ffff00 65%,#ffaa00 73%,#ff5500 81%,#ff0000 89%,#880000 100%)',
      unit: 'mm', title: 'PRECIP.'
    },
    precip_rate: {
      gradient: 'linear-gradient(to top,#0a0f1e 0%,#003399 15%,#0066ff 30%,#00ccff 45%,#00ff88 60%,#ffff00 75%,#ff6600 88%,#ff0000 100%)',
      unit: 'mm/h', title: 'INTENS.'
    },
    clouds: {
      gradient: 'linear-gradient(to top,#1a1a2e 0%,#2a2a4e 20%,#4a5a7a 40%,#7a8aa8 60%,#aabbd0 80%,#ddeeff 100%)',
      unit: '%', title: 'NUVENS'
    },
    temp: {
      gradient: 'linear-gradient(to top,#000088 0%,#0033ff 10%,#0099ff 20%,#00ffff 30%,#00ff44 40%,#aaff00 50%,#ffff00 60%,#ffaa00 70%,#ff5500 80%,#ff0000 90%,#880000 100%)',
      unit: '°C', title: 'TEMP.'
    },
    wind: {
      gradient: 'linear-gradient(to top,#05091a 0%,#001a66 15%,#003399 30%,#0066cc 45%,#00aaff 60%,#00ddff 75%,#44ffff 88%,#aaffff 100%)',
      unit: 'km/h', title: 'VENTO'
    }
  };

  const cfg = configs[type] || configs.precip_accum;
  bar.style.background = cfg.gradient;
  unit.textContent = cfg.unit;
  title.textContent = cfg.title;
}

// ──────────────────────────────────────────
// WEATHER DATA via Open-Meteo
// ──────────────────────────────────────────
async function fetchWeatherData(lat, lon) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=precipitation_sum,temperature_2m_max,temperature_2m_min,windspeed_10m_max&hourly=precipitation,temperature_2m,windspeed_10m&current_weather=true&timezone=America%2FSao_Paulo&forecast_days=8`;
    const res = await fetch(url);
    const data = await res.json();
    weatherData = data;
    updateInfoCards(data, currentStep);
  } catch(e) {
    console.warn('Weather fetch error:', e);
  }
}

function updateInfoCards(data, step) {
  if (!data) return;
  try {
    const daily = data.daily;
    const cw = data.current_weather;

    const precip = daily?.precipitation_sum?.[step];
    const tMax = daily?.temperature_2m_max?.[step];
    const tMin = daily?.temperature_2m_min?.[step];
    const wind = daily?.windspeed_10m_max?.[step];

    document.getElementById('statChuva').textContent =
      precip != null ? precip.toFixed(1) : '--';
    document.getElementById('statTemp').textContent =
      (tMax != null && tMin != null) ? `${Math.round(tMin)}~${Math.round(tMax)}` : '--';
    document.getElementById('statVento').textContent =
      wind != null ? Math.round(wind) : '--';
  } catch(e) {}
}

// ──────────────────────────────────────────
// MAP CLICK POPUP
// ──────────────────────────────────────────
async function onMapClick(e) {
  const { lat, lng } = e.latlng;
  const popup = L.popup({ closeButton: true })
    .setLatLng(e.latlng)
    .setContent(`<div class="popup-title">⏳ Carregando...</div>`)
    .openOn(map);

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lng.toFixed(3)}&daily=precipitation_sum,temperature_2m_max,temperature_2m_min,windspeed_10m_max&current_weather=true&timezone=America%2FSao_Paulo&forecast_days=8`;
    const res = await fetch(url);
    const data = await res.json();

    const step = currentStep;
    const precip = data.daily?.precipitation_sum?.[step];
    const tMax = data.daily?.temperature_2m_max?.[step];
    const tMin = data.daily?.temperature_2m_min?.[step];
    const wind = data.daily?.windspeed_10m_max?.[step];
    const dateStr = data.daily?.time?.[step];

    popup.setContent(`
      <div class="popup-title">📍 ${lat.toFixed(2)}°, ${lng.toFixed(2)}°</div>
      <div class="popup-row">
        <span class="popup-key">Data</span>
        <span class="popup-val">${dateStr || '--'}</span>
      </div>
      <div class="popup-row">
        <span class="popup-key">🌧 Chuva</span>
        <span class="popup-val">${precip != null ? precip.toFixed(1) + ' mm' : '--'}</span>
      </div>
      <div class="popup-row">
        <span class="popup-key">🌡 Temp</span>
        <span class="popup-val">${tMin != null ? Math.round(tMin)+'~'+Math.round(tMax)+'°C' : '--'}</span>
      </div>
      <div class="popup-row">
        <span class="popup-key">💨 Vento</span>
        <span class="popup-val">${wind != null ? Math.round(wind) + ' km/h' : '--'}</span>
      </div>
    `);
  } catch(e) {
    popup.setContent('<div class="popup-title">Erro ao carregar dados</div>');
  }
}

// ──────────────────────────────────────────
// GEOLOCATION
// ──────────────────────────────────────────
function locateUser() {
  const btn = document.getElementById('btnLocate');
  btn.classList.add('locating');
  btn.textContent = '⏳';

  if (!navigator.geolocation) {
    showToast('Geolocalização não disponível');
    btn.classList.remove('locating');
    btn.textContent = '🎯';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      map.flyTo([userLat, userLon], 7, { duration: 1.5 });

      // User marker
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([userLat, userLon], {
        icon: L.divIcon({
          className: '',
          html: '<div class="user-marker"></div>',
          iconSize: [20, 20],
          iconAnchor: [10, 10]
        })
      }).addTo(map);

      btn.classList.remove('locating');
      btn.textContent = '🎯';

      // Reverse geocode (nominatim)
      reverseGeocode(userLat, userLon);
      fetchWeatherData(userLat, userLon);
      showToast('Localização encontrada!');
    },
    err => {
      btn.classList.remove('locating');
      btn.textContent = '🎯';
      showToast('Não foi possível obter localização');
      fetchWeatherData(userLat, userLon);
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

async function reverseGeocode(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pt-BR`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
    const data = await res.json();
    const city = data.address?.city || data.address?.town || data.address?.village || data.address?.county || '';
    const state = data.address?.state || '';
    const name = city ? `${city}, ${state}` : state || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    document.getElementById('locName').textContent = name.substring(0, 20);
  } catch(e) {
    document.getElementById('locName').textContent = `${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;
  }
}

// ──────────────────────────────────────────
// LAYER SWITCH
// ──────────────────────────────────────────
function setLayer(type, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentLayer = type;
  updateLegendForLayer(type);

  const models = {
    precip_accum: 'ECMWF',
    precip_rate: 'RADAR',
    clouds: 'GFS',
    temp: 'GFS',
    wind: 'GFS'
  };
  document.getElementById('modelBadge').textContent = models[type] || 'ECMWF';

  loadRainLayer(type, currentStep);
}

// ──────────────────────────────────────────
// TIME SLIDER
// ──────────────────────────────────────────
function buildTimeMarks() {
  const container = document.getElementById('timeMarks');
  const days = ['Hoje', 'Amanhã', '+2d', '+3d', '+4d', '+5d', '+6d', '+7d'];
  container.innerHTML = days.map(d =>
    `<span class="time-mark">${d}</span>`
  ).join('');
}

function onSlider(el) {
  const val = parseInt(el.value);
  currentStep = val;
  const pct = (val / 7 * 100).toFixed(0);
  el.style.setProperty('--pct', pct + '%');

  const d = steps[val];
  const days = ['Hoje','Amanhã','2ª feira','3ª feira','4ª feira','5ª feira','6ª feira','Sábado'];
  const dateStr = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
  const label = val === 0 ? 'Hoje' : val === 1 ? 'Amanhã' :
    d.toLocaleDateString('pt-BR', { weekday: 'short', day:'2-digit', month:'2-digit' });

  document.getElementById('timeValue').textContent = `+${val * 24}h (${label})`;

  loadRainLayer(currentLayer, val);
  if (weatherData) updateInfoCards(weatherData, val);
}

function updateTimeLabel(timestamp) {
  if (!timestamp) return;
  const d = new Date(timestamp);
  const fmt = d.toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
  });
  document.getElementById('timeValue').textContent = fmt;
}

// ──────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !v);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ──────────────────────────────────────────
// START
// ──────────────────────────────────────────
window.addEventListener('load', () => {
  initMap();
  // Init slider visual
  document.getElementById('timeSlider').style.setProperty('--pct', '0%');
});
</script>
